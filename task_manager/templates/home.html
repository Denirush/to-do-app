<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .task-box {
            border-radius: 15px;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
        }
    </style>

</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="text-white fw-bold">
            My Tasks
        </h2>

        <div>
            <a href="{% url 'create' %}" class="btn btn-success me-2">
                + Create Task
            </a>

            <a href="{% url 'logout' %}" class="btn btn-danger">
                Logout
            </a>
        </div>

    </div>


    <div class="row">

        {% for x in tasks %}

        <div class="col-md-6 col-lg-4 mb-3">

            <div class="card shadow border-0 task-box">

                <div class="card-body d-flex justify-content-between align-items-center">


                    <span class="task-title 
                    {% if x.completed %}text-decoration-line-through text-muted{% endif %}">
                        {{ x.name }}
                    </span>


                    <div class="d-flex align-items-center gap-3">


                        <!-- Complete Task -->
                        <form method="POST" action="{% url 'toggle' x.pk %}">
                            {% csrf_token %}

                            <input 
                                class="form-check-input"
                                type="checkbox"
                                {% if x.completed %}checked{% endif %}
                                onchange="this.form.submit()">

                        </form>


                        <!-- Delete Task -->
                        <form method="POST" action="{% url 'delete' x.pk %}">
                            {% csrf_token %}

                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                ✕
                            </button>

                        </form>


                    </div>


                </div>

            </div>

        </div>


        {% empty %}

        <div class="text-center">

            <h4 class="text-white">
                No tasks found
            </h4>

        </div>

        {% endfor %}


    </div>

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
